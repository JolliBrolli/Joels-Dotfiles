unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s
set -g default-terminal "tmux-256color"
set -g mouse on

# Start window and pane indexing from 1
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber windows when one is closed (optional but recommended)
set -g renumber-windows on
# Stop tmux from automatically renaming windows
set-option -g allow-rename off
set-window-option -g automatic-rename off


set-option -g status-position top


bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
# ...alongside
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run ~/.tmux/plugins/tmux/catppuccin.tmux


# Make the status line pretty and add some modules
# Configure Catppuccin to use the window name you set
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_status_module "all"
set -g @catppuccin_window_text " #W"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

set -g @plugin 'christoomey/vim-tmux-navigator'
run ~/.tmux/plugins/tpm/tpm
